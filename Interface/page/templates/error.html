<!DOCTYPE html>
<html>
<head>
    <title>错误</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .error-box {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .btn {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>❌ 出错啦</h1>
        <p>{{ message }}</p>
    </div>
    <a href="/" class="btn">返回首页</a>
</body>
</html>

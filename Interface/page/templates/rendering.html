<!DOCTYPE html>
<html>
<head>
    <title>正在生成3D场景</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #007bff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .progress-text {
            margin: 20px 0;
            color: #666;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007bff, #00c6ff);
            width: 0%;
            transition: width 0.5s ease;
        }
        .status-message {
            margin: 10px 0;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 正在生成3D场景</h1>
        <div class="loader"></div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text">
            <p>正在处理您的场景...</p>
            <p>这可能需要几分钟时间，请勿关闭页面</p>
        </div>
        <div class="status-message" id="statusMessage">初始化渲染系统...</div>
        <div id="status"></div>
    </div>

    <script>
        // 页面加载后立即开始渲染
        window.addEventListener('load', function() {
            startRendering();
        });

        // 模拟进度条更新
        function updateProgress(percentage, message) {
            const progressFill = document.getElementById('progressFill');
            const statusMessage = document.getElementById('statusMessage');
            
            progressFill.style.width = percentage + '%';
            if (message) {
                statusMessage.textContent = message;
            }
        }

        async function startRendering() {
            const statusEl = document.getElementById('status');

            try {
                updateProgress(10, '正在初始化资产检索系统...');

                const response = await fetch('/start_render', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();

                if (data.status === 'success') {
                    updateProgress(100, '3D场景生成成功！');
                    // 渲染成功，跳转到结果页面
                    setTimeout(() => {
                        window.location.href = '/result';
                    }, 1500);
                } else if (data.status === 'processing') {
                    // 处理中的状态
                    updateProgress(50, '场景正在生成中，请稍候...');
                    statusEl.innerHTML = `<span style="color: orange;">处理中: ${data.message}</span>`;
                    
                    // 如果是处理中状态，可以设置轮询检查进度
                    checkRenderProgress(data.task_id);
                } else {
                    // 渲染失败，显示错误
                    updateProgress(0, '生成失败');
                    statusEl.innerHTML = `<span style="color: red;">错误: ${data.message}</span>`;
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 5000);
                }

            } catch (error) {
                updateProgress(0, '请求失败');
                statusEl.innerHTML = `<span style="color: red;">请求失败: ${error}</span>`;
                setTimeout(() => {
                    window.location.href = '/preview';
                }, 5000);
            }
        }

        // 检查渲染进度的函数（如果需要）
        async function checkRenderProgress(taskId) {
            // 这里可以添加轮询逻辑来检查任务进度
            // 例如每5秒检查一次任务状态
            const checkInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/check_progress/${taskId}`);
                    const data = await response.json();
                    
                    if (data.status === 'success') {
                        clearInterval(checkInterval);
                        updateProgress(100, '3D场景生成成功！');
                        setTimeout(() => {
                            window.location.href = '/result';
                        }, 1500);
                    } else if (data.status === 'processing') {
                        updateProgress(75, '场景生成接近完成...');
                    } else if (data.status === 'error') {
                        clearInterval(checkInterval);
                        updateProgress(0, '生成失败');
                        document.getElementById('status').innerHTML = 
                            `<span style="color: red;">错误: ${data.message}</span>`;
                        setTimeout(() => {
                            window.location.href = '/preview';
                        }, 5000);
                    }
                } catch (error) {
                    console.error('检查进度失败:', error);
                }
            }, 5000); // 每5秒检查一次
        }

        // 模拟进度更新（用于演示）
        function simulateProgress() {
            let progress = 10;
            const messages = [
                '正在初始化资产检索系统...',
                '加载3D模型资源...',
                '配置场景参数...',
                '生成场景布局...',
                '渲染3D场景...',
                '最终处理中...'
            ];
            
            let messageIndex = 0;
            
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 90) {
                    progress = 90;
                    clearInterval(interval);
                }
                
                updateProgress(progress, messages[messageIndex]);
                messageIndex = (messageIndex + 1) % messages.length;
            }, 2000);
        }

        // 开始模拟进度（在实际部署时可以移除）
        simulateProgress();
    </script>
</body>
</html>

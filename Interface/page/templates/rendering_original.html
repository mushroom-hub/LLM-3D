<!DOCTYPE html>
<html>
<head>
    <title>正在生成3D场景</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #007bff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .progress-text {
            margin: 20px 0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 正在生成3D场景</h1>
        <div class="loader"></div>
        <div class="progress-text">
            <p>正在处理您的场景...</p>
            <p>这可能需要几分钟时间，请勿关闭页面</p>
        </div>
        <div id="status">初始化渲染系统...</div>
    </div>

    <script>
        // 页面加载后立即开始渲染
        window.addEventListener('load', function() {
            startRendering();
        });

        async function startRendering() {
            const statusEl = document.getElementById('status');

            try {
                statusEl.textContent = '正在初始化资产检索系统...';

                const response = await fetch('/start_render', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();

                if (data.status === 'success') {
                    // 渲染成功，跳转到结果页面
                    window.location.href = '/result';
                } else {
                    // 渲染失败，显示错误
                    statusEl.innerHTML = `<span style="color: red;">错误: ${data.message}</span>`;
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 5000);
                }

            } catch (error) {
                statusEl.innerHTML = `<span style="color: red;">请求失败: ${error}</span>`;
            }
        }
    </script>
</body>
</html>
